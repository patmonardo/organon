<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sankara Translation Workbench</title>
    <style>
      :root {
        --bg: #f5f2ea;
        --bg-panel: #fffdf8;
        --ink: #1f1b17;
        --muted: #6d6358;
        --line: #d8cfc1;
        --accent: #2b6f77;
        --accent-soft: #d8ecef;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: 'Source Serif 4', 'Georgia', serif;
        color: var(--ink);
        background: radial-gradient(
          circle at 10% 10%,
          #fefcf7 0%,
          #f1ece1 45%,
          #ebe3d6 100%
        );
        min-height: 100vh;
      }

      .layout {
        display: grid;
        grid-template-columns: 320px 1fr;
        min-height: 100vh;
      }

      .sidebar {
        border-right: 1px solid var(--line);
        background: linear-gradient(180deg, #f8f4ec 0%, #f3ebde 100%);
        padding: 16px;
        overflow: auto;
      }

      .brand {
        font-size: 20px;
        letter-spacing: 0.02em;
        margin: 0 0 10px;
      }

      .sub {
        margin: 0 0 12px;
        color: var(--muted);
        font-size: 14px;
      }

      .controls {
        display: grid;
        gap: 8px;
        margin-bottom: 14px;
      }

      .controls input,
      .controls select {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 8px 10px;
        font-family: inherit;
        font-size: 14px;
        background: #fff;
        color: var(--ink);
      }

      .count {
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 10px;
      }

      .list {
        display: grid;
        gap: 6px;
      }

      .item {
        display: block;
        width: 100%;
        text-align: left;
        border: 1px solid var(--line);
        background: var(--bg-panel);
        border-radius: 8px;
        padding: 8px 10px;
        font-family: inherit;
        cursor: pointer;
      }

      .item:hover {
        border-color: var(--accent);
        background: var(--accent-soft);
      }

      .item.active {
        border-color: var(--accent);
        background: var(--accent-soft);
        box-shadow: inset 0 0 0 1px var(--accent);
      }

      .item .id {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 2px;
      }

      .item .meta {
        font-size: 12px;
        color: var(--muted);
      }

      .main {
        padding: 18px 24px;
        overflow: auto;
      }

      .toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        margin-bottom: 12px;
        border-bottom: 1px solid var(--line);
        padding-bottom: 10px;
      }

      .toolbar .label {
        font-size: 13px;
        color: var(--muted);
      }

      .doc {
        max-width: 900px;
        margin: 0 auto;
        background: var(--bg-panel);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 20px 26px;
        box-shadow: 0 8px 24px rgba(66, 43, 12, 0.08);
        line-height: 1.55;
        white-space: normal;
      }

      .doc h1,
      .doc h2,
      .doc h3 {
        margin-top: 1.1em;
        margin-bottom: 0.4em;
        line-height: 1.25;
      }

      .doc h1 {
        font-size: 1.7rem;
      }
      .doc h2 {
        font-size: 1.3rem;
        border-bottom: 1px solid var(--line);
        padding-bottom: 4px;
      }
      .doc h3 {
        font-size: 1.05rem;
      }

      .doc p {
        margin: 0.5em 0;
      }
      .doc ul,
      .doc ol {
        margin: 0.4em 0 0.7em 1.3em;
      }
      .doc li {
        margin: 0.2em 0;
      }

      .doc code {
        font-family: 'JetBrains Mono', 'Consolas', monospace;
        background: #f2eee6;
        border: 1px solid #ded3c4;
        border-radius: 4px;
        padding: 0.05em 0.3em;
        font-size: 0.92em;
      }

      .doc pre {
        overflow: auto;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #ded3c4;
        background: #f2eee6;
      }

      .doc a {
        color: var(--accent);
        text-decoration: none;
      }

      .doc a:hover {
        text-decoration: underline;
      }

      @media (max-width: 980px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .sidebar {
          border-right: 0;
          border-bottom: 1px solid var(--line);
          max-height: 40vh;
        }

        .main {
          padding: 12px;
        }

        .doc {
          padding: 16px;
        }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <h1 class="brand">Sankara Translation Workbench</h1>
        <p class="sub">Basic Markdown View (v0.1)</p>
        <div class="controls">
          <input
            id="searchInput"
            type="search"
            placeholder="Search record id or content"
          />
          <select id="sectionFilter">
            <option value="">All sections</option>
          </select>
        </div>
        <div id="count" class="count">Loading records...</div>
        <div id="recordList" class="list"></div>
      </aside>
      <main class="main">
        <div class="toolbar">
          <div class="label" id="currentMeta">No record selected</div>
        </div>
        <article id="doc" class="doc">
          <h2>Ready</h2>
          <p>Select a record from the left panel.</p>
        </article>
      </main>
    </div>

    <script>
      const state = {
        manifest: null,
        records: [],
        selectedRecordId: null,
      };

      const dom = {
        searchInput: document.getElementById('searchInput'),
        sectionFilter: document.getElementById('sectionFilter'),
        recordList: document.getElementById('recordList'),
        count: document.getElementById('count'),
        doc: document.getElementById('doc'),
        currentMeta: document.getElementById('currentMeta'),
      };

      function escapeHtml(text) {
        return text
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function markdownToHtml(markdown) {
        const lines = markdown.split(/\r?\n/);
        const out = [];
        let i = 0;
        let inCode = false;
        let listType = null;

        function closeList() {
          if (listType) {
            out.push(listType === 'ol' ? '</ol>' : '</ul>');
            listType = null;
          }
        }

        while (i < lines.length) {
          const raw = lines[i];
          const line = raw.trimEnd();

          if (line.startsWith('```')) {
            closeList();
            if (!inCode) {
              inCode = true;
              out.push('<pre><code>');
            } else {
              inCode = false;
              out.push('</code></pre>');
            }
            i += 1;
            continue;
          }

          if (inCode) {
            out.push(escapeHtml(raw) + '\n');
            i += 1;
            continue;
          }

          if (!line) {
            closeList();
            i += 1;
            continue;
          }

          const heading = line.match(/^(#{1,3})\s+(.*)$/);
          if (heading) {
            closeList();
            const level = heading[1].length;
            out.push(`<h${level}>${inlineMd(heading[2])}</h${level}>`);
            i += 1;
            continue;
          }

          const ordered = line.match(/^\d+\.\s+(.*)$/);
          if (ordered) {
            if (listType !== 'ol') {
              closeList();
              listType = 'ol';
              out.push('<ol>');
            }
            out.push(`<li>${inlineMd(ordered[1])}</li>`);
            i += 1;
            continue;
          }

          const unordered = line.match(/^[-*]\s+(.*)$/);
          if (unordered) {
            if (listType !== 'ul') {
              closeList();
              listType = 'ul';
              out.push('<ul>');
            }
            out.push(`<li>${inlineMd(unordered[1])}</li>`);
            i += 1;
            continue;
          }

          closeList();
          out.push(`<p>${inlineMd(line)}</p>`);
          i += 1;
        }

        closeList();
        if (inCode) {
          out.push('</code></pre>');
        }

        return out.join('');
      }

      function inlineMd(text) {
        let html = escapeHtml(text);
        html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
        html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
        html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
        html = html.replace(
          /\[([^\]]+)\]\(([^)]+)\)/g,
          '<a href="$2" target="_blank" rel="noopener">$1</a>',
        );
        return html;
      }

      function buildSectionOptions(sections) {
        for (const section of sections) {
          const option = document.createElement('option');
          option.value = section.section_code;
          option.textContent = `Section ${section.section_code} (${section.record_count})`;
          dom.sectionFilter.appendChild(option);
        }
      }

      function filteredRecords() {
        const query = dom.searchInput.value.trim().toLowerCase();
        const section = dom.sectionFilter.value;

        return state.records.filter((record) => {
          if (section && record.section_code !== section) {
            return false;
          }

          if (!query) {
            return true;
          }

          const haystack = [
            record.record_id,
            record.record_kind,
            record.section_code,
            record.source_text,
            record.literal_translation,
            record.technical_translation,
            ...(record.argument_tags || []),
          ]
            .join(' ')
            .toLowerCase();

          return haystack.includes(query);
        });
      }

      function renderRecordList() {
        const records = filteredRecords();
        dom.recordList.innerHTML = '';
        dom.count.textContent = `${records.length} record(s)`;

        for (const record of records) {
          const button = document.createElement('button');
          button.type = 'button';
          button.className =
            'item' +
            (record.record_id === state.selectedRecordId ? ' active' : '');
          button.innerHTML = `<div class="id">${escapeHtml(record.record_id)}</div><div class="meta">${escapeHtml(record.record_kind || 'unknown')} | Section ${escapeHtml(record.section_code)}</div>`;
          button.addEventListener('click', () => {
            state.selectedRecordId = record.record_id;
            renderRecordList();
            openRecord(record);
          });
          dom.recordList.appendChild(button);
        }
      }

      async function openRecord(record) {
        dom.currentMeta.textContent = `${record.record_id} | ${record.record_kind || 'unknown'} | Section ${record.section_code}`;
        dom.doc.innerHTML = '<p>Loading markdown...</p>';
        const response = await fetch(record.md_path);
        if (!response.ok) {
          dom.doc.innerHTML = `<p>Failed to load ${escapeHtml(record.md_path)}</p>`;
          return;
        }
        const markdown = await response.text();
        dom.doc.innerHTML = markdownToHtml(markdown);
      }

      async function init() {
        const response = await fetch('./manifest.json');
        if (!response.ok) {
          dom.doc.innerHTML =
            '<h2>Manifest not found</h2><p>Run the generator script first.</p>';
          dom.count.textContent = '0 record(s)';
          return;
        }

        state.manifest = await response.json();
        state.records = state.manifest.records || [];

        buildSectionOptions(state.manifest.sections || []);
        renderRecordList();

        const first = state.records[0];
        if (first) {
          state.selectedRecordId = first.record_id;
          renderRecordList();
          await openRecord(first);
        } else {
          dom.doc.innerHTML =
            '<h2>No records</h2><p>No projected markdown records found.</p>';
        }

        dom.searchInput.addEventListener('input', renderRecordList);
        dom.sectionFilter.addEventListener('change', renderRecordList);
      }

      init().catch((err) => {
        dom.doc.innerHTML = `<h2>Viewer error</h2><p>${escapeHtml(String(err))}</p>`;
        dom.count.textContent = '0 record(s)';
      });
    </script>
  </body>
</html>
