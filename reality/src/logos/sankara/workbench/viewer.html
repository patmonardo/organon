<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sankara Translation Workbench</title>
    <style>
      :root {
        --bg: #f5f2ea;
        --bg-panel: #fffdf8;
        --ink: #1f1b17;
        --muted: #6d6358;
        --line: #d8cfc1;
        --accent: #2b6f77;
        --accent-soft: #d8ecef;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: 'Source Serif 4', 'Georgia', serif;
        color: var(--ink);
        background: radial-gradient(
          circle at 10% 10%,
          #fefcf7 0%,
          #f1ece1 45%,
          #ebe3d6 100%
        );
        min-height: 100vh;
      }

      .layout {
        display: grid;
        grid-template-columns: 320px 1fr;
        min-height: 100vh;
      }

      .sidebar {
        border-right: 1px solid var(--line);
        background: linear-gradient(180deg, #f8f4ec 0%, #f3ebde 100%);
        padding: 16px;
        overflow: auto;
      }

      .brand {
        font-size: 20px;
        letter-spacing: 0.02em;
        margin: 0 0 10px;
      }

      .sub {
        margin: 0 0 12px;
        color: var(--muted);
        font-size: 14px;
      }

      .controls {
        display: grid;
        gap: 8px;
        margin-bottom: 14px;
      }

      .controls input,
      .controls select {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 8px 10px;
        font-family: inherit;
        font-size: 14px;
        background: #fff;
        color: var(--ink);
      }

      .kind-presets {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 6px;
      }

      .kind-presets button {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--bg-panel);
        color: var(--ink);
        font-family: inherit;
        font-size: 12px;
        padding: 6px 8px;
        cursor: pointer;
      }

      .kind-presets button.active {
        border-color: var(--accent);
        background: var(--accent-soft);
      }

      .count {
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 10px;
      }

      .mode-hint {
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 10px;
        padding: 6px 8px;
        border: 1px dashed var(--line);
        border-radius: 8px;
        background: #faf6ee;
      }

      .mode-hint.warn {
        border-style: solid;
        border-color: #c27f2b;
        background: #fff6e6;
        color: #7c4f12;
      }

      .debug-panel {
        margin-bottom: 10px;
        padding: 6px 8px;
        border: 1px dashed var(--line);
        border-radius: 8px;
        background: #f7f2e8;
        color: var(--muted);
        font-size: 11px;
        line-height: 1.45;
        white-space: pre-wrap;
      }

      .list {
        display: grid;
        gap: 6px;
      }

      .item {
        display: block;
        width: 100%;
        text-align: left;
        border: 1px solid var(--line);
        background: var(--bg-panel);
        border-radius: 8px;
        padding: 8px 10px;
        font-family: inherit;
        cursor: pointer;
      }

      .item:hover {
        border-color: var(--accent);
        background: var(--accent-soft);
      }

      .item.active {
        border-color: var(--accent);
        background: var(--accent-soft);
        box-shadow: inset 0 0 0 1px var(--accent);
      }

      .item .id {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 2px;
      }

      .item .meta {
        font-size: 12px;
        color: var(--muted);
      }

      .main {
        padding: 18px 24px;
        overflow: auto;
      }

      .toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        margin-bottom: 12px;
        border-bottom: 1px solid var(--line);
        padding-bottom: 10px;
      }

      .toolbar .label {
        font-size: 13px;
        color: var(--muted);
      }

      .toolbar-actions {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }

      .toolbar-actions button {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--bg-panel);
        color: var(--ink);
        font-family: inherit;
        font-size: 12px;
        padding: 5px 8px;
        cursor: pointer;
      }

      .toolbar-actions button:hover {
        border-color: var(--accent);
        background: var(--accent-soft);
      }

      .citation-strip {
        margin-bottom: 12px;
        padding: 8px 10px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #faf6ee;
        color: var(--muted);
        font-size: 12px;
      }

      .citation-strip a {
        color: var(--accent);
        text-decoration: none;
      }

      .citation-strip a:hover {
        text-decoration: underline;
      }

      .doc {
        max-width: 900px;
        margin: 0 auto;
        background: var(--bg-panel);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 20px 26px;
        box-shadow: 0 8px 24px rgba(66, 43, 12, 0.08);
        line-height: 1.55;
        white-space: normal;
      }

      .doc h1,
      .doc h2,
      .doc h3 {
        margin-top: 1.1em;
        margin-bottom: 0.4em;
        line-height: 1.25;
      }

      .doc h1 {
        font-size: 1.7rem;
      }
      .doc h2 {
        font-size: 1.3rem;
        border-bottom: 1px solid var(--line);
        padding-bottom: 4px;
      }
      .doc h3 {
        font-size: 1.05rem;
      }

      .doc p {
        margin: 0.5em 0;
      }
      .doc ul,
      .doc ol {
        margin: 0.4em 0 0.7em 1.3em;
      }
      .doc li {
        margin: 0.2em 0;
      }

      .doc code {
        font-family: 'JetBrains Mono', 'Consolas', monospace;
        background: #f2eee6;
        border: 1px solid #ded3c4;
        border-radius: 4px;
        padding: 0.05em 0.3em;
        font-size: 0.92em;
      }

      .doc pre {
        overflow: auto;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #ded3c4;
        background: #f2eee6;
      }

      .doc a {
        color: var(--accent);
        text-decoration: none;
      }

      .doc a:hover {
        text-decoration: underline;
      }

      @media (max-width: 980px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .sidebar {
          border-right: 0;
          border-bottom: 1px solid var(--line);
          max-height: 40vh;
        }

        .main {
          padding: 12px;
        }

        .doc {
          padding: 16px;
        }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <h1 class="brand">Sankara Translation Workbench</h1>
        <p class="sub">Basic Markdown View (v0.1)</p>
        <div class="controls">
          <input
            id="searchInput"
            type="search"
            placeholder="Search record id or content"
          />
          <select id="viewProfile">
            <option value="simple" selected>View: Simple</option>
            <option value="core">View: Core</option>
            <option value="source">View: Source</option>
            <option value="translation">View: Translation</option>
            <option value="curation">View: Curation</option>
            <option value="markdown">View: Full Markdown</option>
          </select>
          <select id="sectionFilter">
            <option value="">All sections</option>
          </select>
          <div class="kind-presets" id="kindPresets">
            <button type="button" data-preset="all">All</button>
            <button type="button" data-preset="opening">Opening</button>
            <button type="button" data-preset="verse">Verses</button>
            <button type="button" data-preset="verse-bhasya">
              Verse + Bhasya
            </button>
          </div>
        </div>
        <div id="count" class="count">Loading records...</div>
        <div id="modeHint" class="mode-hint">Mode: All records</div>
        <div id="debugPanel" class="debug-panel" hidden></div>
        <div id="recordList" class="list"></div>
      </aside>
      <main class="main">
        <div class="toolbar">
          <div class="label" id="currentMeta">No record selected</div>
          <div class="toolbar-actions">
            <button type="button" id="jumpOpeningBtn">Opening Preamble</button>
            <button type="button" id="jumpSutraBtn">First Sutra</button>
          </div>
        </div>
        <div class="citation-strip" id="citationMeta">No citation selected</div>
        <article id="doc" class="doc">
          <h2>Ready</h2>
          <p>Select a record from the left panel.</p>
        </article>
      </main>
    </div>

    <script>
      const state = {
        manifest: null,
        records: [],
        recordInfoById: new Map(),
        selectedRecordId: null,
        semantic: null,
        diagnostics: null,
      };

      const dom = {
        searchInput: document.getElementById('searchInput'),
        viewProfile: document.getElementById('viewProfile'),
        sectionFilter: document.getElementById('sectionFilter'),
        kindPresetButtons: Array.from(
          document.querySelectorAll('#kindPresets [data-preset]'),
        ),
        recordList: document.getElementById('recordList'),
        count: document.getElementById('count'),
        modeHint: document.getElementById('modeHint'),
        debugPanel: document.getElementById('debugPanel'),
        doc: document.getElementById('doc'),
        currentMeta: document.getElementById('currentMeta'),
        citationMeta: document.getElementById('citationMeta'),
        jumpOpeningBtn: document.getElementById('jumpOpeningBtn'),
        jumpSutraBtn: document.getElementById('jumpSutraBtn'),
      };

      const KIND_PRESETS = {
        all: [],
        opening: ['preamble'],
        verse: ['sutra'],
        'verse-bhasya': ['sutra', 'bhasya', 'preamble'],
      };

      const VIEW_PROFILES = {
        simple: ['kind'],
        core: ['kind', 'section'],
        source: ['kind', 'section', 'source'],
        translation: ['kind', 'literal', 'technical'],
        curation: ['kind', 'section', 'tags'],
        markdown: ['kind', 'section'],
      };

      function escapeHtml(text) {
        return text
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function markdownToHtml(markdown) {
        const lines = markdown.split(/\r?\n/);
        const out = [];
        let i = 0;
        let inCode = false;
        let listType = null;

        function closeList() {
          if (listType) {
            out.push(listType === 'ol' ? '</ol>' : '</ul>');
            listType = null;
          }
        }

        while (i < lines.length) {
          const raw = lines[i];
          const line = raw.trimEnd();

          if (line.startsWith('```')) {
            closeList();
            if (!inCode) {
              inCode = true;
              out.push('<pre><code>');
            } else {
              inCode = false;
              out.push('</code></pre>');
            }
            i += 1;
            continue;
          }

          if (inCode) {
            out.push(escapeHtml(raw) + '\n');
            i += 1;
            continue;
          }

          if (!line) {
            closeList();
            i += 1;
            continue;
          }

          const heading = line.match(/^(#{1,3})\s+(.*)$/);
          if (heading) {
            closeList();
            const level = heading[1].length;
            out.push(`<h${level}>${inlineMd(heading[2])}</h${level}>`);
            i += 1;
            continue;
          }

          const ordered = line.match(/^\d+\.\s+(.*)$/);
          if (ordered) {
            if (listType !== 'ol') {
              closeList();
              listType = 'ol';
              out.push('<ol>');
            }
            out.push(`<li>${inlineMd(ordered[1])}</li>`);
            i += 1;
            continue;
          }

          const unordered = line.match(/^[-*]\s+(.*)$/);
          if (unordered) {
            if (listType !== 'ul') {
              closeList();
              listType = 'ul';
              out.push('<ul>');
            }
            out.push(`<li>${inlineMd(unordered[1])}</li>`);
            i += 1;
            continue;
          }

          closeList();
          out.push(`<p>${inlineMd(line)}</p>`);
          i += 1;
        }

        closeList();
        if (inCode) {
          out.push('</code></pre>');
        }

        return out.join('');
      }

      function inlineMd(text) {
        let html = escapeHtml(text);
        html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
        html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
        html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
        html = html.replace(
          /\[([^\]]+)\]\(([^)]+)\)/g,
          '<a href="$2" target="_blank" rel="noopener">$1</a>',
        );
        return html;
      }

      function buildSectionOptions(sections) {
        for (const section of sections) {
          const option = document.createElement('option');
          option.value = section.section_code;
          option.textContent = `Section ${section.section_code} (${section.record_count})`;
          dom.sectionFilter.appendChild(option);
        }
      }

      function shortText(value, maxLen = 80) {
        const text = String(value || '')
          .trim()
          .replace(/\s+/g, ' ');
        if (!text) {
          return '(empty)';
        }
        return text.length > maxLen ? text.slice(0, maxLen - 1) + '…' : text;
      }

      function currentProfileKey() {
        const key = String(dom.viewProfile.value || 'simple').toLowerCase();
        return Object.prototype.hasOwnProperty.call(VIEW_PROFILES, key)
          ? key
          : 'simple';
      }

      function profileFieldText(record, field) {
        if (field === 'kind') {
          const kind = displayKind(record);
          const anchor = displayAnchor(record);
          return anchor ? `Kind: ${kind} · ${anchor}` : `Kind: ${kind}`;
        }
        if (field === 'section') {
          return `Section ${String(record.section_code || 'n/a')}`;
        }
        if (field === 'source') {
          return `Src: ${shortText(record.source_text, 70)}`;
        }
        if (field === 'literal') {
          return `Lit: ${shortText(record.literal_translation, 70)}`;
        }
        if (field === 'technical') {
          return `Tech: ${shortText(record.technical_translation, 70)}`;
        }
        if (field === 'tags') {
          const tags = Array.isArray(record.argument_tags)
            ? record.argument_tags
                .map((x) => String(x))
                .filter((x) => x.length > 0)
            : [];
          return tags.length > 0
            ? `Tags: ${tags.slice(0, 3).join(', ')}`
            : 'Tags: none';
        }
        return '';
      }

      function formatRecordMeta(record) {
        const fields = VIEW_PROFILES[currentProfileKey()] || VIEW_PROFILES.core;
        const values = fields
          .map((field) => profileFieldText(record, field))
          .filter((text) => text.length > 0);
        return values.join(' | ') || ' ';
      }

      function formatCurrentMeta(record) {
        const fields = VIEW_PROFILES[currentProfileKey()] || VIEW_PROFILES.core;
        const values = fields
          .map((field) => profileFieldText(record, field))
          .filter((text) => text.length > 0)
          .join(' | ');
        return `${record.record_id}${values ? ` | ${values}` : ''}`;
      }

      function renderSimpleStructured(record, profileKey) {
        const sourceText = shortText(record.source_text, 6000);
        const transliterationRaw = String(
          record.transliteration_iast || record.transliteration || '',
        ).trim();
        const transliteration =
          transliterationRaw || '(not available in record)';
        const literal = shortText(record.literal_translation, 6000);
        const technical = shortText(record.technical_translation, 6000);
        const tags = Array.isArray(record.argument_tags)
          ? record.argument_tags
              .map((x) => String(x))
              .filter((x) => x.length > 0)
          : [];

        const chunks = [];

        if (
          profileKey === 'simple' ||
          profileKey === 'source' ||
          profileKey === 'core'
        ) {
          chunks.push(
            '<h2>Source</h2>',
            `<h3>Source Text</h3><p>${escapeHtml(sourceText)}</p>`,
            `<h3>Transliteration</h3><p>${escapeHtml(transliteration)}</p>`,
          );
        }

        if (profileKey === 'simple' || profileKey === 'translation') {
          chunks.push(
            '<h2>Translation</h2>',
            `<h3>Literal</h3><p>${escapeHtml(literal)}</p>`,
            `<h3>Technical</h3><p>${escapeHtml(technical)}</p>`,
          );
        }

        if (profileKey === 'curation') {
          chunks.push(
            '<h2>Curation</h2>',
            `<p><strong>Kind:</strong> ${escapeHtml(displayKind(record))}</p>`,
            `<p><strong>Tags:</strong> ${escapeHtml(tags.length ? tags.join(', ') : 'none')}</p>`,
          );
        }

        if (profileKey === 'core') {
          chunks.push(
            '<h2>Core</h2>',
            `<p><strong>Kind:</strong> ${escapeHtml(displayKind(record))}</p>`,
            `<p><strong>Section:</strong> ${escapeHtml(String(record.section_code || 'n/a'))}</p>`,
          );
        }

        dom.doc.innerHTML = chunks.join('');
      }

      function parseListParam(params, key) {
        const raw = (params.get(key) || '').trim();
        if (!raw) {
          return [];
        }
        return raw
          .split(',')
          .map((x) => x.trim().toLowerCase())
          .filter((x) => x.length > 0);
      }

      function parseAnchorParam(raw) {
        const text = String(raw || '').trim();
        if (!text) {
          return null;
        }
        const parts = text
          .split('.')
          .map((x) => x.trim())
          .filter((x) => x.length > 0)
          .map((x) => Number.parseInt(x, 10));
        if (parts.some((x) => !Number.isFinite(x) || x <= 0)) {
          return null;
        }
        if (parts.length === 1) {
          return { sutra: parts[0] };
        }
        if (parts.length === 2) {
          return { chapter: parts[0], section: parts[1] };
        }
        return { chapter: parts[0], section: parts[1], sutra: parts[2] };
      }

      function parseRecordLocator(recordId) {
        const m = String(recordId || '').match(
          /^SKR\.([^.]+)\.(\d+)\.(\d+)\.([A-Z0-9]+)$/,
        );
        if (!m) {
          return null;
        }
        const chapter = Number.parseInt(m[2], 10);
        const section = Number.parseInt(m[3], 10);
        const unitRaw = m[4];
        const sutra = /^\d+$/.test(unitRaw)
          ? Number.parseInt(unitRaw, 10)
          : undefined;
        return {
          work: m[1],
          chapter,
          section,
          unitRaw,
          sutra,
        };
      }

      function recordKind(record) {
        const raw = String(
          record && record.record_kind ? record.record_kind : '',
        )
          .trim()
          .toLowerCase();
        return raw && raw !== 'unknown' ? raw : 'unknown';
      }

      function recordUnitLabel(record) {
        const locator = parseRecordLocator(record && record.record_id);
        if (!locator) {
          return '';
        }
        if (locator.unitRaw === 'PRE') {
          return 'opening';
        }
        if (/^\d+$/.test(locator.unitRaw)) {
          return `${locator.chapter}.${locator.section}.${Number(locator.unitRaw)}`;
        }
        return locator.unitRaw;
      }

      function buildRecordInfo(records) {
        const info = new Map();
        const bySection = new Map();

        for (const record of records) {
          const section = String(record.section_code || '');
          if (!bySection.has(section)) {
            bySection.set(section, []);
          }
          bySection.get(section).push(record);
        }

        for (const rows of bySection.values()) {
          let lastSutraLabel = '';
          for (const record of rows) {
            const kind = recordKind(record);
            const selfLabel = recordUnitLabel(record);
            let anchor = selfLabel;

            if (kind === 'sutra' && selfLabel) {
              lastSutraLabel = selfLabel;
            } else if (kind === 'bhasya' && lastSutraLabel) {
              anchor = lastSutraLabel;
            } else if (kind === 'preamble') {
              anchor = 'opening';
            }

            info.set(record.record_id, { kind, anchor });
          }
        }

        return info;
      }

      function displayKind(record) {
        const info = state.recordInfoById.get(record.record_id);
        return info && info.kind ? info.kind : recordKind(record);
      }

      function displayAnchor(record) {
        const info = state.recordInfoById.get(record.record_id);
        if (info && info.anchor) {
          return info.anchor;
        }
        return recordUnitLabel(record);
      }

      function sectionSortKey(sectionCode) {
        return String(sectionCode || '')
          .split('.')
          .map((x) => Number.parseInt(x, 10))
          .filter((x) => Number.isFinite(x));
      }

      function compareSectionCodes(left, right) {
        const l = sectionSortKey(left);
        const r = sectionSortKey(right);
        const n = Math.max(l.length, r.length);
        for (let i = 0; i < n; i += 1) {
          const lv = Number.isFinite(l[i]) ? l[i] : 0;
          const rv = Number.isFinite(r[i]) ? r[i] : 0;
          if (lv !== rv) {
            return lv - rv;
          }
        }
        return String(left || '').localeCompare(String(right || ''));
      }

      function recordUnitOrder(recordId) {
        const locator = parseRecordLocator(recordId);
        if (!locator) {
          return { value: Number.MAX_SAFE_INTEGER, raw: '' };
        }
        if (locator.unitRaw === 'PRE') {
          return { value: -1, raw: locator.unitRaw };
        }
        const numeric = Number.parseInt(locator.unitRaw, 10);
        return {
          value: Number.isFinite(numeric) ? numeric : Number.MAX_SAFE_INTEGER,
          raw: locator.unitRaw,
        };
      }

      function buildDiagnostics(records) {
        const bySection = new Map();
        for (const record of records) {
          const section = String(record.section_code || '');
          if (!bySection.has(section)) {
            bySection.set(section, []);
          }
          bySection.get(section).push(record);
        }

        const perSection = {};
        for (const [section, rows] of bySection.entries()) {
          const sorted = [...rows].sort((a, b) => {
            return (
              recordUnitOrder(a.record_id).value -
              recordUnitOrder(b.record_id).value
            );
          });

          let firstSutraIndex = -1;
          for (let i = 0; i < sorted.length; i += 1) {
            if (displayKind(sorted[i]) === 'sutra') {
              firstSutraIndex = i;
              break;
            }
          }

          const preambleAfterSutra = [];
          if (firstSutraIndex >= 0) {
            for (let i = firstSutraIndex + 1; i < sorted.length; i += 1) {
              if (displayKind(sorted[i]) === 'preamble') {
                preambleAfterSutra.push(sorted[i].record_id);
              }
            }
          }

          perSection[section] = {
            first_sutra_record_id:
              firstSutraIndex >= 0 ? sorted[firstSutraIndex].record_id : null,
            preamble_after_sutra: preambleAfterSutra,
          };
        }

        return { perSection };
      }

      function currentSectionWarning() {
        const sectionCode = currentSectionCode();
        if (
          !sectionCode ||
          !state.diagnostics ||
          !state.diagnostics.perSection
        ) {
          return '';
        }
        const data = state.diagnostics.perSection[sectionCode];
        if (!data || !Array.isArray(data.preamble_after_sutra)) {
          return '';
        }
        if (data.preamble_after_sutra.length === 0) {
          return '';
        }
        return `Warning: section ${sectionCode} has preamble tagged records after first sutra (${data.preamble_after_sutra.slice(0, 4).join(', ')}).`;
      }

      function renderDebugPanel() {
        const params = new URLSearchParams(window.location.search);
        const enabled = (params.get('debug') || '').toLowerCase();
        const show = enabled === '1' || enabled === 'true';
        dom.debugPanel.hidden = !show;
        if (!show) {
          return;
        }

        const selected = state.records.find(
          (x) => x.record_id === state.selectedRecordId,
        );
        const sectionCode = currentSectionCode();
        const activePreset = activeKindPreset();
        const filtered = filteredRecords();
        const warning = currentSectionWarning();
        const lines = [
          `Debug Mode`,
          `section=${sectionCode || 'all'} preset=${activePreset}`,
          `selected=${selected ? selected.record_id : 'none'}`,
          `filtered_count=${filtered.length}`,
        ];
        if (warning) {
          lines.push(warning);
        }
        dom.debugPanel.textContent = lines.join('\n');
      }

      function currentSectionCode() {
        const selected = state.records.find(
          (x) => x.record_id === state.selectedRecordId,
        );
        if (selected && selected.section_code) {
          return selected.section_code;
        }
        return dom.sectionFilter.value || '';
      }

      function findFirstByKind(kind, sectionCode) {
        const targetKind = String(kind || '').toLowerCase();
        for (const record of state.records) {
          if (sectionCode && record.section_code !== sectionCode) {
            continue;
          }
          if (displayKind(record) === targetKind) {
            return record;
          }
        }
        return null;
      }

      function renderCitationMeta(record) {
        const sourceUrl = String(record.source_url || '').trim();
        const chunks = [
          `<strong>${escapeHtml(String(record.record_id || ''))}</strong>`,
          `Kind: ${escapeHtml(displayKind(record))}`,
          `Section: ${escapeHtml(String(record.section_code || 'n/a'))}`,
        ];
        if (sourceUrl) {
          chunks.push(
            `Source: <a href="${escapeHtml(sourceUrl)}" target="_blank" rel="noopener">link</a>`,
          );
        }
        dom.citationMeta.innerHTML = chunks.join(' | ');
      }

      function selectAndOpenRecord(record) {
        if (!record) {
          return;
        }
        state.selectedRecordId = record.record_id;
        renderRecordList();
        openRecord(record).catch(() => {
          dom.doc.innerHTML = '<p>Failed to load record.</p>';
        });
      }

      function syncSelectionWithFilters() {
        const records = filteredRecords();
        if (records.length === 0) {
          state.selectedRecordId = null;
          dom.currentMeta.textContent = 'No record selected';
          dom.citationMeta.textContent = 'No citation selected';
          dom.doc.innerHTML = '<p>No records match the current filters.</p>';
          return;
        }

        const selected = records.find(
          (x) => x.record_id === state.selectedRecordId,
        );
        if (selected) {
          openRecord(selected).catch(() => {
            dom.doc.innerHTML = '<p>Failed to load record.</p>';
          });
          return;
        }

        selectAndOpenRecord(records[0]);
      }

      function parseSemanticFromLocation() {
        const params = new URLSearchParams(window.location.search);
        const kinds = parseListParam(params, 'kinds');
        const topics = parseListParam(params, 'topics');
        const transitions = parseListParam(params, 'tx');
        const anchor = parseAnchorParam(params.get('anchor'));
        const coLocatedRaw = (params.get('co_located') || '').toLowerCase();
        const coLocatedOnly = coLocatedRaw === '1' || coLocatedRaw === 'true';

        if (
          kinds.length === 0 &&
          topics.length === 0 &&
          transitions.length === 0 &&
          !anchor &&
          !coLocatedOnly
        ) {
          return null;
        }

        return {
          kinds,
          topics,
          transitions,
          anchor,
          coLocatedOnly,
        };
      }

      function recordTopicTags(record) {
        if (Array.isArray(record.topic_tags) && record.topic_tags.length > 0) {
          return record.topic_tags.map((x) => String(x).toLowerCase());
        }
        return Array.isArray(record.argument_tags)
          ? record.argument_tags.map((x) => String(x).toLowerCase())
          : [];
      }

      function ensureSemanticState() {
        if (!state.semantic) {
          state.semantic = {
            kinds: [],
            topics: [],
            transitions: [],
            anchor: null,
            coLocatedOnly: false,
          };
        }
        if (!Array.isArray(state.semantic.kinds)) {
          state.semantic.kinds = [];
        }
        return state.semantic;
      }

      function sameKinds(left, right) {
        if (left.length !== right.length) {
          return false;
        }
        const ls = [...left].sort().join('|');
        const rs = [...right].sort().join('|');
        return ls === rs;
      }

      function activeKindPreset() {
        const semantic = state.semantic;
        const activeKinds =
          semantic && Array.isArray(semantic.kinds)
            ? semantic.kinds.map((x) => String(x).toLowerCase())
            : [];

        if (activeKinds.length === 0) {
          return 'all';
        }
        if (sameKinds(activeKinds, KIND_PRESETS.opening)) {
          return 'opening';
        }
        if (sameKinds(activeKinds, KIND_PRESETS.verse)) {
          return 'verse';
        }
        if (sameKinds(activeKinds, KIND_PRESETS['verse-bhasya'])) {
          return 'verse-bhasya';
        }
        return 'custom';
      }

      function renderKindPresetButtons() {
        const active = activeKindPreset();
        for (const button of dom.kindPresetButtons) {
          button.classList.toggle('active', button.dataset.preset === active);
        }

        const warning = currentSectionWarning();
        dom.modeHint.classList.toggle('warn', warning.length > 0);

        if (active === 'opening') {
          dom.modeHint.textContent =
            'Mode: English opening lane (preamble only). Sutra rows like *.001 are excluded here.';
          if (warning) {
            dom.modeHint.textContent += ` ${warning}`;
          }
          renderDebugPanel();
          return;
        }
        if (active === 'verse') {
          dom.modeHint.textContent = 'Mode: Sutra-only lane.';
          if (warning) {
            dom.modeHint.textContent += ` ${warning}`;
          }
          renderDebugPanel();
          return;
        }
        if (active === 'verse-bhasya') {
          dom.modeHint.textContent =
            'Mode: Sutra + Bhasya lane (includes preamble).';
          if (warning) {
            dom.modeHint.textContent += ` ${warning}`;
          }
          renderDebugPanel();
          return;
        }
        dom.modeHint.textContent = warning
          ? `Mode: All records. ${warning}`
          : 'Mode: All records.';
        renderDebugPanel();
      }

      function applyKindPreset(preset) {
        const semantic = ensureSemanticState();
        semantic.kinds = [...(KIND_PRESETS[preset] || [])];
        renderKindPresetButtons();
        renderRecordList();

        const records = filteredRecords();
        if (records.length === 0) {
          state.selectedRecordId = null;
          dom.currentMeta.textContent = 'No record selected';
          dom.citationMeta.textContent = 'No citation selected';
          dom.doc.innerHTML = '<p>No records match the current filters.</p>';
          return;
        }

        if (!records.some((x) => x.record_id === state.selectedRecordId)) {
          state.selectedRecordId = records[0].record_id;
          renderRecordList();
          openRecord(records[0]).catch(() => {
            dom.doc.innerHTML = '<p>Failed to load markdown.</p>';
          });
        }
      }

      function applyOpeningFocus() {
        const sectionCode = currentSectionCode();
        if (sectionCode) {
          dom.sectionFilter.value = sectionCode;
        }

        const semantic = ensureSemanticState();
        semantic.kinds = [...KIND_PRESETS.opening];
        renderKindPresetButtons();
        renderRecordList();

        const records = filteredRecords();
        if (records.length === 0) {
          state.selectedRecordId = null;
          dom.currentMeta.textContent = 'No opening preamble found';
          dom.citationMeta.textContent = sectionCode
            ? `Section ${sectionCode}: no opening preamble extracted.`
            : 'No opening preamble extracted.';
          dom.doc.innerHTML = sectionCode
            ? `<p>No opening preamble records were found for section ${escapeHtml(sectionCode)}.</p>`
            : '<p>No opening preamble records were found in the current scope.</p>';
          return;
        }

        selectAndOpenRecord(records[0]);
      }

      function matchesSemantic(record, semantic) {
        if (!semantic) {
          return true;
        }

        const locator = parseRecordLocator(record.record_id);

        if (semantic.kinds.length > 0) {
          const kind = displayKind(record);
          if (!semantic.kinds.includes(kind)) {
            return false;
          }
        }

        if (semantic.topics.length > 0) {
          const tags = recordTopicTags(record);
          if (!semantic.topics.some((topic) => tags.includes(topic))) {
            return false;
          }
        }

        if (semantic.transitions.length > 0) {
          const hay = [
            record.source_text,
            record.literal_translation,
            record.technical_translation,
          ]
            .join(' ')
            .toLowerCase();
          if (!semantic.transitions.some((term) => hay.includes(term))) {
            return false;
          }
        }

        if (semantic.anchor && locator) {
          if (
            semantic.anchor.chapter != null &&
            locator.chapter !== semantic.anchor.chapter
          ) {
            return false;
          }
          if (
            semantic.anchor.section != null &&
            locator.section !== semantic.anchor.section
          ) {
            return false;
          }
          if (semantic.anchor.sutra != null) {
            if (!Number.isFinite(locator.sutra)) {
              return false;
            }
            if (semantic.coLocatedOnly) {
              if (locator.sutra !== semantic.anchor.sutra) {
                return false;
              }
            } else if (locator.sutra !== semantic.anchor.sutra) {
              return false;
            }
          }
        }

        return true;
      }

      function filteredRecords() {
        const query = dom.searchInput.value.trim().toLowerCase();
        const section = dom.sectionFilter.value;

        return state.records.filter((record) => {
          if (section && record.section_code !== section) {
            return false;
          }

          if (!matchesSemantic(record, state.semantic)) {
            return false;
          }

          if (!query) {
            return true;
          }

          const haystack = [
            record.record_id,
            displayKind(record),
            record.section_code,
            record.source_text,
            record.literal_translation,
            record.technical_translation,
            ...(record.argument_tags || []),
          ]
            .join(' ')
            .toLowerCase();

          return haystack.includes(query);
        });
      }

      function renderRecordList() {
        const records = filteredRecords();
        dom.recordList.innerHTML = '';
        dom.count.textContent = `${records.length} record(s)`;
        renderDebugPanel();

        for (const record of records) {
          const button = document.createElement('button');
          button.type = 'button';
          button.className =
            'item' +
            (record.record_id === state.selectedRecordId ? ' active' : '');
          button.innerHTML = `<div class="id">${escapeHtml(record.record_id)}</div><div class="meta">${escapeHtml(formatRecordMeta(record))}</div>`;
          button.addEventListener('click', () => {
            state.selectedRecordId = record.record_id;
            renderRecordList();
            openRecord(record);
          });
          dom.recordList.appendChild(button);
        }
      }

      async function openRecord(record) {
        dom.currentMeta.textContent = formatCurrentMeta(record);
        renderCitationMeta(record);
        const profileKey = currentProfileKey();
        if (profileKey !== 'markdown') {
          renderSimpleStructured(record, profileKey);
          return;
        }

        dom.doc.innerHTML = '<p>Loading markdown...</p>';
        const response = await fetch(record.md_path);
        if (!response.ok) {
          dom.doc.innerHTML = `<p>Failed to load ${escapeHtml(record.md_path)}</p>`;
          return;
        }
        const markdown = await response.text();
        dom.doc.innerHTML = markdownToHtml(markdown);
      }

      async function init() {
        const response = await fetch('./manifest.json');
        if (!response.ok) {
          dom.doc.innerHTML =
            '<h2>Manifest not found</h2><p>Run the generator script first.</p>';
          dom.count.textContent = '0 record(s)';
          return;
        }

        state.manifest = await response.json();
        state.records = state.manifest.records || [];
        state.records.sort((a, b) => {
          const sectionCmp = compareSectionCodes(
            a.section_code,
            b.section_code,
          );
          if (sectionCmp !== 0) {
            return sectionCmp;
          }
          return (
            recordUnitOrder(a.record_id).value -
            recordUnitOrder(b.record_id).value
          );
        });
        state.recordInfoById = buildRecordInfo(state.records);
        state.semantic = parseSemanticFromLocation();
        state.diagnostics = buildDiagnostics(state.records);

        buildSectionOptions(state.manifest.sections || []);
        renderKindPresetButtons();
        renderRecordList();

        const first = state.records[0];
        if (first) {
          state.selectedRecordId = first.record_id;
          renderRecordList();
          await openRecord(first);
        } else {
          dom.doc.innerHTML =
            '<h2>No records</h2><p>No projected markdown records found.</p>';
        }

        dom.searchInput.addEventListener('input', () => {
          renderRecordList();
          syncSelectionWithFilters();
        });
        dom.viewProfile.addEventListener('change', () => {
          renderRecordList();
          const selected = state.records.find(
            (x) => x.record_id === state.selectedRecordId,
          );
          if (selected) {
            openRecord(selected).catch(() => {
              dom.doc.innerHTML = '<p>Failed to load record.</p>';
            });
          }
        });
        dom.sectionFilter.addEventListener('change', () => {
          renderRecordList();
          syncSelectionWithFilters();
        });
        for (const button of dom.kindPresetButtons) {
          button.addEventListener('click', () => {
            applyKindPreset(button.dataset.preset || 'all');
          });
        }

        dom.jumpOpeningBtn.addEventListener('click', applyOpeningFocus);

        dom.jumpSutraBtn.addEventListener('click', () => {
          const target = findFirstByKind('sutra', currentSectionCode());
          if (target) {
            selectAndOpenRecord(target);
          }
        });
      }

      init().catch((err) => {
        dom.doc.innerHTML = `<h2>Viewer error</h2><p>${escapeHtml(String(err))}</p>`;
        dom.count.textContent = '0 record(s)';
      });
    </script>
  </body>
</html>
